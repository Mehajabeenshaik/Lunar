version: '3.11'

services:
  warehouse-env:
    build: .
    ports:
      - "5000:5000"
    environment:
      - API_BASE_URL=${API_BASE_URL:-https://api.openai.com/v1}
      - MODEL_NAME=${MODEL_NAME:-gpt-4-turbo}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - WAREHOUSE_TASK=${WAREHOUSE_TASK:-warehouse_easy}
      - PORT=5000
    volumes:
      - .:/app
    command: python -m warehouse_env.server
