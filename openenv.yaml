name: lunar-warehouse-benchmark
spec_version: 1
version: "3.0.0"
description: "LUNAR: Warehouse Inventory Optimization Benchmark - Real-world RL environment for multi-warehouse supply chain coordination"

type: rl-environment
runtime: docker
app: app.py
port: 7860
tagline: "Train agents to optimize warehouse inventory across multiple locations with demand forecasting and constraints"

features:
  multi_domain: false
  task_count: 3
  session_management: true
  leaderboard: true
  multi_agent: false
  difficulty_progression: true
  deterministic_graders: true
  partial_credit: true

domains:
  - warehouse_management

tasks:
  # Domain: Warehouse Management (3 production-ready tasks)
  - id: warehouse_easy
    name: "Warehouse Easy"
    description: "Single warehouse with fixed demand. Learn to balance inventory costs vs service level."
    difficulty: easy
    domain: warehouse_management
    max_steps: 30
    observation_fields:
      - warehouse_levels
      - demand_forecast
      - supplier_status
      - day
      - holding_costs
      - shortage_penalty
    
  - id: warehouse_medium
    name: "Warehouse Medium"
    description: "Three warehouses with variable demand. Coordinate inventory across network with transfer costs."
    difficulty: medium
    domain: warehouse_management
    max_steps: 60
    observation_fields:
      - warehouse_levels
      - demand_forecast
      - supplier_status
      - day
      - holding_costs
      - shortage_penalty
      - transfer_costs
    
  - id: warehouse_hard
    name: "Warehouse Hard"
    description: "Five warehouses with seasonal demand, supplier constraints, and aggressive SLA requirements. Master complex multi-site logistics."
    difficulty: hard
    domain: warehouse_management
    max_steps: 90
    observation_fields:
      - warehouse_levels
      - demand_forecast
      - supplier_status
      - day
      - holding_costs
      - shortage_penalty
      - transfer_costs
      - seasonal_factors
      - supplier_constraints

api:
  host: "0.0.0.0"
  port: 7860
  endpoints:
    - path: "/health"
      method: "GET"
      description: "Health check endpoint"
    - path: "/manifest"
      method: "GET"
      description: "Get environment manifest and specification"
    - path: "/tasks"
      method: "GET"
      description: "List all available tasks"
    - path: "/reset"
      method: "POST"
      description: "Initialize a new episode with optional task selection"
    - path: "/step"
      method: "POST"
      description: "Execute one environment step with agent action"
    - path: "/state/{session_id}"
      method: "GET"
      description: "Get complete session state"
    - path: "/sessions"
      method: "GET"
      description: "List active sessions"
    - path: "/leaderboard"
      method: "GET"
      description: "Get leaderboard rankings by reward"
    - path: "/docs"
      method: "GET"
      description: "Interactive Swagger API documentation"

reward_info:
  type: "float"
  minimum: 0.0
  maximum: 1.0
  description: "Partial credit reward. Never binary (0 or 1 only), always provides progress signal"
  scaling:
    warehouse_easy: "0.0-1.0 based on service level achievement"
    warehouse_medium: "0.0-1.0 based on cost efficiency + service level"
    warehouse_hard: "0.0-1.0 based on multi-objective optimization: cost, service, constraints"

reward_function: "Service level (80% minimum) - 0.1*(holding_cost + shortage_penalty)/max_possible"

constraints:
  max_warehouse_capacity: 1000
  supplier_lead_time: 2
  max_transfer_cost: 50
