name: "Lunar Comprehensive Benchmark"
spec_version: 1
version: "2.0"
description: "Lunar: 31-task comprehensive benchmark across 5 domains - Warehouse, Data Pipeline, Code Review, Resource Allocation, System Optimization"

type: rl-environment
runtime: docker
app: app.py
port: 7860
tagline: "Advanced multi-domain RL benchmark with 31 tasks, 5 specializations, and deterministic evaluation"

features:
  multi_domain: true
  task_count: 31
  domain_count: 5
  session_management: true
  leaderboard: true
  multi_agent: false
  difficulty_progression: true
  deterministic_graders: true
  partial_credit: true
  episode_based_scoring: true
  adaptive_difficulty: true

domains:
  - warehouse
  - data_pipeline
  - code_review
  - resource_allocation
  - system_optimization

graders:
  - warehouse_grader
  - data_pipeline_grader
  - code_review_grader
  - resource_allocation_grader
  - system_optimization_grader

tasks:
  # ===== WAREHOUSE (5 tasks) =====
  - id: warehouse_novice
    name: "Warehouse Novice"
    description: "1 warehouse, fixed demand, simple inventory management"
    difficulty: novice
    domain: warehouse
    max_steps: 20
    has_grader: true
    grader_type: "WarehouseNoviceGrader"

  - id: warehouse_easy
    name: "Warehouse Easy"
    description: "2 warehouses, variable demand, basic distribution"
    difficulty: easy
    domain: warehouse
    max_steps: 30
    has_grader: true
    grader_type: "WarehouseEasyGrader"

  - id: warehouse_medium
    name: "Warehouse Medium"
    description: "3 warehouses, variable demand, basic distribution"
    difficulty: medium
    domain: warehouse
    max_steps: 60
    has_grader: true
    grader_type: "WarehouseMediumGrader"

  - id: warehouse_intermediate
    name: "Warehouse Intermediate"
    description: "3 warehouses, seasonal demand, cross-warehouse transfers"
    difficulty: intermediate
    domain: warehouse
    max_steps: 60
    has_grader: true
    grader_type: "WarehouseIntermediateGrader"

  - id: warehouse_hard
    name: "Warehouse Hard"
    description: "5 warehouses, complex constraints, optimization required"
    difficulty: hard
    domain: warehouse
    max_steps: 90
    has_grader: true
    grader_type: "WarehouseHardGrader"

  - id: warehouse_extreme
    name: "Warehouse Extreme"
    description: "8 warehouses, dynamic constraints, multi-objective optimization"
    difficulty: extreme
    domain: warehouse
    max_steps: 120
    has_grader: true
    grader_type: "WarehouseExtremeGrader"

  # ===== DATA PIPELINE (8 tasks) =====
  - id: data_ingestion_simple
    name: "Data Ingestion Simple"
    description: "Basic data loading and validation"
    difficulty: easy
    domain: data_pipeline
    has_grader: true
    grader_type: "DataIngestionSimpleGrader"

  - id: data_ingestion_complex
    name: "Data Ingestion Complex"
    description: "Streaming data with rate limiting and buffering"
    difficulty: hard
    domain: data_pipeline
    has_grader: true
    grader_type: "DataIngestionComplexGrader"

  - id: data_cleaning_basic
    name: "Data Cleaning Basic"
    description: "Handling missing values and basic outliers"
    difficulty: easy
    domain: data_pipeline
    has_grader: true
    grader_type: "DataCleaningBasicGrader"

  - id: data_cleaning_advanced
    name: "Data Cleaning Advanced"
    description: "Outlier detection, anomaly detection, and deduplication"
    difficulty: hard
    domain: data_pipeline
    has_grader: true
    grader_type: "DataCleaningAdvancedGrader"

  - id: data_validation_schema
    name: "Data Validation Schema"
    description: "Schema enforcement and type validation"
    difficulty: intermediate
    domain: data_pipeline
    has_grader: true
    grader_type: "DataValidationSchemaGrader"

  - id: data_validation_quality
    name: "Data Validation Quality"
    description: "Quality checks and statistical validation"
    difficulty: hard
    domain: data_pipeline
    has_grader: true
    grader_type: "DataValidationQualityGrader"

  - id: data_transformation_etl
    name: "Data Transformation ETL"
    description: "ETL pipeline with complex transformations"
    difficulty: hard
    domain: data_pipeline
    has_grader: true
    grader_type: "DataTransformationETLGrader"

  - id: data_export_format
    name: "Data Export Format"
    description: "Multi-format export with optimization"
    difficulty: intermediate
    domain: data_pipeline
    has_grader: true
    grader_type: "DataExportFormatGrader"

  # ===== CODE REVIEW (8 tasks) =====
  - id: code_style_compliance
    name: "Code Style Compliance"
    description: "Enforce code style standards and conventions"
    difficulty: easy
    domain: code_review
    has_grader: true
    grader_type: "CodeStyleComplianceGrader"

  - id: code_performance_optimization
    name: "Code Performance Optimization"
    description: "Identify and optimize performance bottlenecks"
    difficulty: hard
    domain: code_review
    has_grader: true
    grader_type: "CodePerformanceOptimizationGrader"

  - id: code_security_vulnerabilities
    name: "Code Security Vulnerabilities"
    description: "Detect security issues and vulnerabilities"
    difficulty: hard
    domain: code_review
    has_grader: true
    grader_type: "CodeSecurityVulnerabilitiesGrader"

  - id: code_maintainability_metrics
    name: "Code Maintainability Metrics"
    description: "Analyze code quality and maintainability"
    difficulty: intermediate
    domain: code_review
    has_grader: true
    grader_type: "CodeMaintainabilityMetricsGrader"

  - id: code_refactoring_simple
    name: "Code Refactoring Simple"
    description: "Apply simple refactoring patterns"
    difficulty: intermediate
    domain: code_review
    has_grader: true
    grader_type: "CodeRefactoringSimpleGrader"

  - id: code_refactoring_complex
    name: "Code Refactoring Complex"
    description: "Complex refactoring with design pattern application"
    difficulty: hard
    domain: code_review
    has_grader: true
    grader_type: "CodeRefactoringComplexGrader"

  - id: code_testing_coverage
    name: "Code Testing Coverage"
    description: "Achieve comprehensive unit test coverage"
    difficulty: intermediate
    domain: code_review
    has_grader: true
    grader_type: "CodeTestingCoverageGrader"

  - id: code_integration_testing
    name: "Code Integration Testing"
    description: "Design and implement integration tests"
    difficulty: hard
    domain: code_review
    has_grader: true
    grader_type: "CodeIntegrationTestingGrader"

  # ===== RESOURCE ALLOCATION (5 tasks) =====
  - id: resource_budget_simple
    name: "Resource Budget Simple"
    description: "Basic budget allocation across projects"
    difficulty: easy
    domain: resource_allocation
    has_grader: true
    grader_type: "ResourceBudgetSimpleGrader"

  - id: resource_budget_complex
    name: "Resource Budget Complex"
    description: "Multi-project budgeting with constraints"
    difficulty: hard
    domain: resource_allocation
    has_grader: true
    grader_type: "ResourceBudgetComplexGrader"

  - id: resource_scheduling_tasks
    name: "Resource Scheduling Tasks"
    description: "Optimize task scheduling with dependencies"
    difficulty: intermediate
    domain: resource_allocation
    has_grader: true
    grader_type: "ResourceSchedulingTasksGrader"

  - id: resource_scheduling_teams
    name: "Resource Scheduling Teams"
    description: "Allocate team members to projects optimally"
    difficulty: hard
    domain: resource_allocation
    has_grader: true
    grader_type: "ResourceSchedulingTeamsGrader"

  - id: resource_capacity_planning
    name: "Resource Capacity Planning"
    description: "Plan capacity requirements for future needs"
    difficulty: hard
    domain: resource_allocation
    has_grader: true
    grader_type: "ResourceCapacityPlanningGrader"

  # ===== SYSTEM OPTIMIZATION (5 tasks) =====
  - id: optimization_query_basic
    name: "Optimization Query Basic"
    description: "Basic database query optimization"
    difficulty: intermediate
    domain: system_optimization
    has_grader: true
    grader_type: "OptimizationQueryBasicGrader"

  - id: optimization_query_advanced
    name: "Optimization Query Advanced"
    description: "Advanced query optimization with indexing"
    difficulty: hard
    domain: system_optimization
    has_grader: true
    grader_type: "OptimizationQueryAdvancedGrader"

  - id: optimization_memory_usage
    name: "Optimization Memory Usage"
    description: "Optimize memory usage and garbage collection"
    difficulty: hard
    domain: system_optimization
    has_grader: true
    grader_type: "OptimizationMemoryUsageGrader"

  - id: optimization_throughput
    name: "Optimization Throughput"
    description: "Maximize system throughput and parallelization"
    difficulty: hard
    domain: system_optimization
    has_grader: true
    grader_type: "OptimizationThroughputGrader"

  - id: optimization_latency
    name: "Optimization Latency"
    description: "Minimize latency and response times"
    difficulty: hard
    domain: system_optimization
    has_grader: true
    grader_type: "OptimizationLatencyGrader"

api:
  host: "0.0.0.0"
  port: 7860
  endpoints:
    - path: "/health"
      method: "GET"
      description: "Health check endpoint"
    - path: "/manifest"
      method: "GET"
      description: "Get environment manifest and specification"
    - path: "/tasks"
      method: "GET"
      description: "List all 31 available tasks"
    - path: "/reset"
      method: "POST"
      description: "Initialize a new episode with task selection"
    - path: "/step"
      method: "POST"
      description: "Execute one environment step with agent action"
    - path: "/state/{session_id}"
      method: "GET"
      description: "Get complete session state"
    - path: "/sessions"
      method: "GET"
      description: "List active sessions"
    - path: "/leaderboard"
      method: "GET"
      description: "Get leaderboard rankings by reward"
    - path: "/docs"
      method: "GET"
      description: "Interactive Swagger API documentation"

reward_info:
  type: "float"
  minimum: 0.0
  maximum: 1.0
  description: "Partial credit reward system across all 32 tasks"
  features:
    - "Never binary (0 or 1 only)"
    - "Always provides progress signal"
    - "Domain-specific grading logic"
    - "Episode-based evaluation"
    - "Deterministic and reproducible"

reward_function: "Domain-specific multi-objective optimization balancing: efficiency, quality, optimization, and constraints"

task_statistics:
  total_tasks: 32
  total_domains: 5
  warehouse_tasks: 6
  data_pipeline_tasks: 8
  code_review_tasks: 8
  resource_allocation_tasks: 5
  system_optimization_tasks: 5
  easy_tasks: 7
  intermediate_tasks: 9
  hard_tasks: 13
  medium_tasks: 1
  extreme_tasks: 1

constraints:
  max_concurrent_sessions: null
  max_session_duration: null
  episode_timeout: 300
