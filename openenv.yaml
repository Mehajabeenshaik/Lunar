spec_version: 1
name: content-moderation-benchmark
version: "2.0"
description: "Meta Content Moderation Agent - Real-world social media moderation at billion-post scale. 30 tasks across 7 domains with advanced reasoning and 6-layer boundary protection."
type: rl-environment
runtime: docker
app: app.py
port: 7860

graders:
  - name: ModeratorGrader
    type: deterministic
    description: Content moderation task grader with 6-layer boundary protection for all 30 tasks
    task_count: 30

tasks:
  # DOMAIN 1: BASIC CLASSIFICATION (Tasks 1-3)
  - id: moderation_task_1
    name: "Post Classification (Easy)"
    description: "Classify posts as Safe, Hate Speech, Spam, or Misinformation"
    difficulty: "easy"
    domain: "text_classification"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_2
    name: "Classification with Reasoning (Medium)"
    description: "Classify posts with reasoning and severity scoring (1-5)"
    difficulty: "medium"
    domain: "text_classification"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_3
    name: "Full Moderation Decision (Hard)"
    description: "Complete moderation: classify, severity, action, explanation"
    difficulty: "hard"
    domain: "text_classification"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]

  # DOMAIN 2: CONTEXT-AWARE MODERATION (Tasks 4-6)
  - id: moderation_task_4
    name: "Author History Context (Easy)"
    description: "Classify posts considering author violation history"
    difficulty: "easy"
    domain: "context_aware_moderation"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_5
    name: "Trending Topic Context (Medium)"
    description: "Apply policy exceptions based on trending topics"
    difficulty: "medium"
    domain: "context_aware_moderation"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_6
    name: "Appeal Case Review (Hard)"
    description: "Review appeals of moderation decisions"
    difficulty: "hard"
    domain: "context_aware_moderation"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]

  # DOMAIN 3: EDGE CASES (Tasks 7-9)
  - id: moderation_task_7
    name: "False Positive Detection (Easy)"
    description: "Identify and correct false positive moderation flags"
    difficulty: "easy"
    domain: "edge_cases"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_8
    name: "Sarcasm & Irony Detection (Medium)"
    description: "Detect sarcasm and irony to avoid false positives"
    difficulty: "medium"
    domain: "edge_cases"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_9
    name: "Coordinated Inauthentic Behavior (Hard)"
    description: "Detect organized harassment campaigns"
    difficulty: "hard"
    domain: "edge_cases"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]

  # DOMAIN 4: IMAGE & MULTIMODAL (Tasks 10-14)
  - id: moderation_task_10
    name: "Image Safety (Easy)"
    description: "Binary safe/explicit image classification"
    difficulty: "easy"
    domain: "multimodal"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_11
    name: "Visual Toxicity (Medium)"
    description: "Graduated severity for toxic visual content"
    difficulty: "medium"
    domain: "multimodal"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_12
    name: "Multimodal Analysis (Medium)"
    description: "Consider both image and text together"
    difficulty: "medium"
    domain: "multimodal"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_13
    name: "Deepfake Detection (Hard)"
    description: "Authenticity judgment for videos/images"
    difficulty: "hard"
    domain: "multimodal"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_14
    name: "Scene Safety Assessment (Hard)"
    description: "Context appropriateness evaluation"
    difficulty: "hard"
    domain: "multimodal"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]

  # DOMAIN 5: USER CONTEXT (Tasks 15-20)
  - id: moderation_task_15
    name: "Author Credibility (Easy)"
    description: "Account legitimacy assessment"
    difficulty: "easy"
    domain: "user_context"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_16
    name: "Bot Detection (Easy)"
    description: "Classify accounts as human or bot"
    difficulty: "easy"
    domain: "user_context"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_17
    name: "Inauthentic Behavior Patterns (Medium)"
    description: "Network coordination detection"
    difficulty: "medium"
    domain: "user_context"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_18
    name: "Misinformation Spread (Medium)"
    description: "Verify claim accuracy and track spread"
    difficulty: "medium"
    domain: "user_context"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_19
    name: "User Appeal Fairness (Hard)"
    description: "Judge appeal validity fairly"
    difficulty: "hard"
    domain: "user_context"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_20
    name: "User Trust Score (Hard)"
    description: "Build user reputation scores"
    difficulty: "hard"
    domain: "user_context"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]

  # DOMAIN 6: CROSS-POST ANALYSIS (Tasks 21-25)
  - id: moderation_task_21
    name: "Campaign Detection (Easy)"
    description: "Identify coordinated inauthentic posts"
    difficulty: "easy"
    domain: "cross_post"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_22
    name: "Viral Misinformation (Medium)"
    description: "Track false claims across platform"
    difficulty: "medium"
    domain: "cross_post"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_23
    name: "Harassment Network (Medium)"
    description: "Detect coordinated harassment campaigns"
    difficulty: "medium"
    domain: "cross_post"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_24
    name: "Context Collapse (Hard)"
    description: "Content appropriateness varies by context"
    difficulty: "hard"
    domain: "cross_post"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_25
    name: "Cross-platform Consistency (Hard)"
    description: "Maintain uniform moderation across platforms"
    difficulty: "hard"
    domain: "cross_post"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]

  # DOMAIN 7: ADVANCED REASONING (Tasks 26-30)
  - id: moderation_task_26
    name: "Satire vs Hate (Hard)"
    description: "Distinguish satire from genuine hate speech"
    difficulty: "hard"
    domain: "advanced_reasoning"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_27
    name: "Cultural Sensitivity (Hard)"
    description: "Context-specific appropriateness"
    difficulty: "hard"
    domain: "advanced_reasoning"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_28
    name: "Policy Evolution (Hard)"
    description: "Apply updated policies correctly"
    difficulty: "hard"
    domain: "advanced_reasoning"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_29
    name: "Multi-language (Hard)"
    description: "Consistent moderation across languages"
    difficulty: "hard"
    domain: "advanced_reasoning"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]
    
  - id: moderation_task_30
    name: "Accessibility (Hard)"
    description: "Accessibility-aware moderation"
    difficulty: "hard"
    domain: "advanced_reasoning"
    grader: ModeratorGrader
    reward_range: [0.001, 0.999]

total_tasks: 30
total_graders: 1
environment: ContentModerationEnv
reward_range: [0.001, 0.999]
domains:
  - text_classification
  - context_aware_moderation
  - edge_cases
  - multimodal
  - user_context
  - cross_post
  - advanced_reasoning

benchmarks:
  - name: "baseline_llm_agent"
    description: "OpenAI-based baseline agent for all 30 tasks"
    target_runtime_seconds: 1800
    expected_average_reward: 0.55
