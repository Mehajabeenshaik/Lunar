spec_version: 1
name: content-moderation-benchmark
version: "1.0"
description: "Meta Content Moderation Agent - Real-world social media moderation at billion-post scale"
type: rl-environment
runtime: docker
app: app.py
port: 7860

graders:
  - name: ModerationGrader
    type: deterministic
    description: Content moderation task grader
    task_count: 3

tasks:
  - id: moderation_task_1_classification
    name: "Post Classification"
    description: "Classify posts as Safe, Hate Speech, Spam, or Misinformation"
    difficulty: "easy"
    grader: ModerationGrader
    
  - id: moderation_task_2_reasoning
    name: "Classification with Reasoning"
    description: "Classify posts with reasoning and severity scoring (1-5)"
    difficulty: "medium"
    grader: ModerationGrader
    
  - id: moderation_task_3_full
    name: "Full Moderation Decision"
    description: "Complete moderation: classify, severity, action, explanation"
    difficulty: "hard"
    grader: ModerationGrader

total_tasks: 3
total_graders: 1
environment: ContentModerationEnv
reward_range: [0.0, 1.0]
domains:
  - social_media_moderation
  - content_safety
  - platform_policy_enforcement
